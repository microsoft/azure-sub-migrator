name: CD

# Both branches deploy to the staging slot first (never directly to production).
# main additionally swaps staging → production after a health check.
# See: https://learn.microsoft.com/azure/app-service/deploy-best-practices#use-deployment-slots

on:
  push:
    branches:
      - main
      - feat/**
      - fix/**
      - hotfix/**

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  # ── Stage 1: deploy to the staging slot (both branches) ──────────
  deploy-staging:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://tenova-app-staging.azurewebsites.net

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create deployment package
        run: |
          pip install --target=".python_packages/lib/site-packages" -r requirements.txt
          zip -r deploy.zip . \
            -x ".git/*" ".github/*" "tests/*" ".python_packages/*" \
               "*.pyc" "__pycache__/*" ".coverage" "*.egg-info/*" \
               ".venv/*" "docs/*" "*.zip" "*.xml"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to staging slot
        uses: azure/webapps-deploy@v3
        with:
          app-name: tenova-app
          slot-name: staging
          package: deploy.zip

      - name: Health check staging
        run: |
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://tenova-app-staging.azurewebsites.net/)
          echo "Staging health check: $STATUS"
          if [ "$STATUS" -ge 500 ]; then
            echo "::error::Staging health check failed with status $STATUS"
            exit 1
          fi

  # ── Stage 2: swap staging → production (main only) ───────────────
  swap-to-production:
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://tenova-app.azurewebsites.net

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Swap staging slot into production
        run: |
          az webapp deployment slot swap \
            --resource-group rg-tenova \
            --name tenova-app \
            --slot staging \
            --target-slot production

      - name: Health check production
        run: |
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://tenova-app.azurewebsites.net/)
          echo "Production health check: $STATUS"
          if [ "$STATUS" -ge 500 ]; then
            echo "::error::Production health check failed – rolling back"
            az webapp deployment slot swap \
              --resource-group rg-tenova \
              --name tenova-app \
              --slot staging \
              --target-slot production
            exit 1
          fi
