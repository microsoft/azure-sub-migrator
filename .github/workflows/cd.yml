name: CD

on:
  push:
    branches: [main, feat/post-transfer]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  deploy-staging:
    needs: test
    if: github.ref == 'refs/heads/feat/post-transfer'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://tenova-app-staging.azurewebsites.net

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create deployment package
        run: |
          pip install --target=".python_packages/lib/site-packages" -r requirements.txt
          zip -r deploy.zip . -x ".git/*" ".github/*" "tests/*" ".python_packages/*" "*.pyc" "__pycache__/*" ".coverage" "*.egg-info/*" ".venv/*" "docs/*" "*.zip" "*.xml"

      - name: Deploy to staging slot
        uses: azure/webapps-deploy@v3
        with:
          app-name: tenova-app
          slot-name: staging
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_STAGING }}
          package: deploy.zip

      - name: Health check
        run: |
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://tenova-app-staging.azurewebsites.net/)
          echo "Health check status: $STATUS"
          if [ "$STATUS" -ge 500 ]; then
            echo "::error::Staging health check failed with status $STATUS"
            exit 1
          fi

  deploy-production:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://tenova-app.azurewebsites.net

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create deployment package
        run: |
          pip install --target=".python_packages/lib/site-packages" -r requirements.txt
          zip -r deploy.zip . -x ".git/*" ".github/*" "tests/*" ".python_packages/*" "*.pyc" "__pycache__/*" ".coverage" "*.egg-info/*" ".venv/*" "docs/*" "*.zip" "*.xml"

      - name: Deploy to production
        uses: azure/webapps-deploy@v3
        with:
          app-name: tenova-app
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_PROD }}
          package: deploy.zip

      - name: Health check
        run: |
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://tenova-app.azurewebsites.net/)
          echo "Health check status: $STATUS"
          if [ "$STATUS" -ge 500 ]; then
            echo "::error::Production health check failed with status $STATUS"
            exit 1
          fi
