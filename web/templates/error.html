{% extends "base.html" %}
{% block title %}Error – Azure Sub Migrator{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6">
    <div class="card border-danger shadow-sm">
      <div class="card-body text-center p-5">
        <i class="bi bi-exclamation-triangle-fill display-3 text-danger mb-3"></i>
        <h4>Something went wrong</h4>
        <p class="text-body-secondary">{{ message }}</p>
        <a href="{{ url_for('main.dashboard') }}" class="btn btn-outline-primary mt-2">
          <i class="bi bi-arrow-left me-1"></i>Back to Dashboard
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
