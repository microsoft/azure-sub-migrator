{% extends "base.html" %}
{% block title %}Admin Consent Granted – Azure Tenant Migration{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6 col-lg-5">
    <div class="card border-success shadow-sm">
      <div class="card-body text-center p-5">
        <i class="bi bi-check-circle-fill display-1 text-success mb-3"></i>
        <h3 class="card-title mb-3">Admin Consent Granted!</h3>
        <p class="text-body-secondary mb-4">
          The Azure Tenant Migrator app has been authorized in tenant
          <code>{{ tenant }}</code>. Users from this tenant can now sign in.
        </p>
        <a href="{{ url_for('main.index') }}" class="btn btn-primary btn-lg w-100">
          <i class="bi bi-box-arrow-in-right me-2"></i>Sign in now
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
